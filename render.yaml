services:
  - type: web
    name: documind-backend
    runtime: docker
    rootDir: backend
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: openai
      - key: CORS_ORIGINS
        sync: false
      - key: UPLOAD_DIR
        value: uploads
      - key: CHROMA_DIR
        value: chroma_data

  - type: web
    name: documind-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
